name: flutter_template
description: A Flutter template project.

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.1.0+2

environment:
  sdk: '>=3.7.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter
    
  cupertino_icons: ^1.0.9
  flutter_hooks: ^0.21.3+1
  flutter_screenutil: ^5.9.3
  logging: ^1.2.0
  intl: any
  google_fonts: ^8.1.0
  font_awesome_flutter: ^11.0.0
  flutter_native_splash: ^2.4.7
  shared_preferences: ^2.5.5
  go_router: ^17.3.0
  flutter_displaymode: ^0.7.0
  flutter_animate: ^4.5.0
  material_color_generator: ^1.1.0
  reactive_forms: ^18.2.2
  dio: ^5.10.0
  persistent_bottom_nav_bar: ^6.2.1

  get_it: ^9.2.1
  flutter_bloc: ^9.1.1
  equatable: ^2.1.0
  fpdart: ^1.2.0
  bloc: ^9.2.1

dev_dependencies:
  build_runner: ^2.15.0
  test: ^1.30.0
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter

  json_serializable: ^6.13.0
  mocktail: ^1.0.5
  mockito: ^5.6.3
  bloc_test: ^10.0.0

  flutter_lints: ^6.0.0
  analyzer_plugin: ^0.13.11
  dart_code_metrics_presets: ^2.31.0

flutter:
  uses-material-design: true

  generate: true

  assets:
    - assets/images/
    - assets/fonts/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon.png"
  adaptive_icon_foreground: "assets/icons/icon-adaptive-foreground.png"
  adaptive_icon_background: "#FFFFFF"